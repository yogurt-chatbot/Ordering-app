<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:#E8EDF2;display:flex;justify-content:center;align-items:center;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  #root{width:100%;max-width:480px;height:100vh;height:100dvh;background:#FAFBFD;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(27,58,75,0.12)}
  @media(min-width:481px){#root{height:94vh;border-radius:24px;border:1px solid #dde3ea}}
  .product-card{transition:transform .22s ease,box-shadow .22s ease;cursor:pointer}
  .product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(27,58,75,0.12)}
  .product-card:active{transform:scale(.97)}
  .size-btn{transition:all .18s ease;cursor:pointer}.size-btn:active{transform:scale(.95)}
  .cart-drawer{transition:transform .35s cubic-bezier(.32,.72,0,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}.cart-item-enter{animation:slideIn .3s ease forwards}
  @keyframes flyToCart{0%{transform:scale(1);opacity:1}50%{transform:scale(.6) translateY(-40px);opacity:.7}100%{transform:scale(.2) translateY(-80px) translateX(60px);opacity:0}}.fly-animation{animation:flyToCart .5s ease-in forwards}
  @keyframes notifSlide{0%{transform:translateX(-50%) translateY(-100%);opacity:0}15%{transform:translateX(-50%) translateY(0);opacity:1}85%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-100%);opacity:0}}.notification{animation:notifSlide 2s ease forwards}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}.cart-badge-pulse{animation:pulse .4s ease}
  .add-btn{transition:all .2s ease}.add-btn:active{transform:scale(.95);filter:brightness(.92)}
  .tab-btn{transition:all .2s ease;cursor:pointer}
  .cat-pill{transition:all .18s ease;cursor:pointer;white-space:nowrap}.cat-pill:active{transform:scale(.95)}
  .remove-btn{transition:all .15s ease}.remove-btn:active{background:#fee2e2}
  .checkout-btn{transition:all .2s ease}.checkout-btn:active{filter:brightness(.9);transform:scale(.98)}
  .scroll-area::-webkit-scrollbar{width:4px}.scroll-area::-webkit-scrollbar-track{background:transparent}.scroll-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>

const {useState,useCallback}=React;

/* ─── SVG ILLUSTRATIONS ─── */

      {toppings==="chocolate"&&<><rect x="44" y="30" width="10" height="5" rx="1" fill="#3C1810" transform="rotate(-12,49,32)"/><rect x="58" y="31" width="10" height="5" rx="1" fill="#4A2318" transform="rotate(10,63,33)"/><circle cx="53" cy="37" r="3.5" fill="#7C1D1D"/><circle cx="67" cy="36" r="3" fill="#991B1B"/></>}
      <rect x="32" y="70" width="56" height="22" rx="3" fill="#fff" opacity="0.85"/>
      <text x="60" y="78" textAnchor="middle" fontSize="5" fontWeight="700" fill="#1565C0" fontFamily="sans-serif">ZEROTRANS</text>
      <text x="60" y="86" textAnchor="middle" fontSize="4" fill="#64748b" fontFamily="sans-serif">GREEK YOGURT</text>
    </svg>
  );
}

  return(
    <svg viewBox="0 0 140 110" width="110" height="86">
      <defs><linearGradient id={"ck"+id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={yc}/><stop offset="100%" stopColor={yc} stopOpacity="0.8"/></linearGradient></defs>

      {toppings==="biscoff"&&<><circle cx="48" cy="32" r="3" fill="#C07830" opacity="0.7"/><circle cx="58" cy="30" r="2.5" fill="#D48838" opacity="0.6"/><circle cx="68" cy="31" r="3" fill="#B06828" opacity="0.7"/><circle cx="78" cy="33" r="2.5" fill="#C07830" opacity="0.6"/><circle cx="53" cy="28" r="2" fill="#D48838" opacity="0.5"/><circle cx="73" cy="28" r="2" fill="#C07830" opacity="0.5"/><circle cx="63" cy="35" r="2.5" fill="#B06828" opacity="0.6"/><rect x="45" y="28" width="6" height="3" rx="1" fill="#A05818" opacity="0.5" transform="rotate(-15,48,29)"/><rect x="70" y="27" width="6" height="3" rx="1" fill="#A05818" opacity="0.5" transform="rotate(10,73,28)"/></>}
      {toppings==="mixedberry"&&<><ellipse cx="50" cy="32" rx="6" ry="4" fill="#EF4444" transform="rotate(-10,50,32)"/><ellipse cx="70" cy="30" rx="6" ry="4" fill="#EF4444" transform="rotate(15,70,30)"/><ellipse cx="85" cy="33" rx="5" ry="3.5" fill="#EF4444" transform="rotate(-5,85,33)"/><circle cx="49" cy="31" r="0.5" fill="#FCA5A5"/><circle cx="69" cy="29" r="0.5" fill="#FCA5A5"/><circle cx="58" cy="28" r="4" fill="#4338CA"/><circle cx="78" cy="28" r="3.5" fill="#4F46E5"/><circle cx="64" cy="34" r="3.5" fill="#5B52D6"/><circle cx="44" cy="35" r="3" fill="#4338CA"/></>}
      {toppings==="strawberry"&&<><ellipse cx="48" cy="31" rx="6" ry="4.5" fill="#EF4444" transform="rotate(-20,48,31)"/><ellipse cx="58" cy="28" rx="6" ry="4.5" fill="#F87171" transform="rotate(0,58,28)"/><ellipse cx="70" cy="28" rx="6" ry="4.5" fill="#EF4444" transform="rotate(10,70,28)"/><ellipse cx="80" cy="30" rx="6" ry="4.5" fill="#F87171" transform="rotate(25,80,30)"/><ellipse cx="88" cy="34" rx="5" ry="3.5" fill="#EF4444" transform="rotate(35,88,34)"/><ellipse cx="42" cy="34" rx="5" ry="3.5" fill="#F87171" transform="rotate(-30,42,34)"/><ellipse cx="64" cy="33" rx="5" ry="3.5" fill="#DC2626"/><circle cx="47" cy="30" r="0.5" fill="#FCA5A5"/><circle cx="57" cy="27" r="0.5" fill="#FCA5A5"/><circle cx="69" cy="27" r="0.5" fill="#FCA5A5"/><circle cx="79" cy="29" r="0.5" fill="#FCA5A5"/></>}
    </svg>
  );
}

/* ─── DATA ─── */
const YP=[
  {id:1,name:"Plain (Original)",cat:"no-sugar",desc:"รสธรรมชาติ เนื้อหนึบ แน่นที่สุด เปรี้ยวน้อย",prices:{sm:49,md:130,lg:290,kilo:550},color:"#F5F0E8",accent:"#C4A97D",tag:null,svg:{yc:"#FFF8EE",yc2:"#F5ECD8",toppings:"none"}},
  {id:2,name:"Blue Spirulina",cat:"no-sugar",desc:"ผสมสาหร่ายสีฟ้า DETOX สารพิษในร่างกาย รสชาติเหมือนรสธรรมชาติ",prices:{sm:59,md:150,lg:330,kilo:590},color:"#E8F0FA",accent:"#5B8DB8",tag:"Superfood",svg:{yc:"#A8D8F0",yc2:"#78C0E8",toppings:"spirulina"}},
  {id:3,name:"Blueberry",cat:"no-sugar",desc:"ผลิตจากผลบลูเบอร์รี่ 100% ใช้น้ำตาลหล่อฮังก้วย ไม่ผสมน้ำเชื่อม",prices:{sm:69,md:170,lg:380,kilo:690},color:"#EDE8F5",accent:"#6B5B8A",tag:"Popular",svg:{yc:"#C8B8E8",yc2:"#A890D8",toppings:"blueberries"}},
  {id:4,name:"Berry Lover",cat:"no-sugar",desc:"สตรอเบอร์รี่ ราสเบอร์รี่ เชอร์รี่แท้ 100% ใช้น้ำตาลหล่อฮังก้วย",prices:{sm:69,md:170,lg:380,kilo:690},color:"#FAE8EE",accent:"#C25B7D",tag:null,svg:{yc:"#F8C0D0",yc2:"#F0A0B8",toppings:"berries"}},
  {id:5,name:"Biscoff Caramel",cat:"sugar",desc:"รสคาราเมล บิสคิส BISCOFF สุดฮิต ถูกใจสายหวาน ไม่กลัวอ้วน",prices:{sm:69,md:170,lg:380,kilo:690},color:"#F5EDE4",accent:"#A0785A",tag:"Bestseller",svg:{yc:"#E8D0B0",yc2:"#D8B888",toppings:"biscoff"}},
  {id:6,name:"Hershey Black Forest",cat:"sugar",desc:"ช็อกโกแลตเข้มข้น ความหอมหวานจาก HERSHEY ซอสเบอร์รี่สดของร้าน",prices:{sm:89,md:200,lg:480,kilo:790},color:"#EAE0E0",accent:"#5C3A3A",tag:"Premium",svg:{yc:"#8B6050",yc2:"#6B4030",toppings:"chocolate"}},
];
const YS=[{id:"sm",name:"Small",weight:"70g",sub:"1 time"},{id:"md",name:"Medium",weight:"200g",sub:"2-3 times"},{id:"lg",name:"Large",weight:"500g",sub:"3-5 times"},{id:"kilo",name:"Kilo",weight:"1000g",sub:"5-10 times"}];
const CP=[
  {id:101,name:"Blueberry Greek Cake",cat:"cake",desc:"Fresh Blueberry · Blueberry Greek Yogurt · Pure Butter Oreo Crumble",layers:{top:"Fresh Blueberry",cake:"Blueberry Greek Yogurt",base:"Pure Butter Oreo Crumble"},prices:{mini:169,sm:280,md:450},color:"#E8E0F5",accent:"#4A3F8A",tag:"Bestseller",svg:{bc:"#3D3028",yc:"#C8B0E8",toppings:"blueberry"}},
  {id:102,name:"Banoffee Biscoff",cat:"cake",desc:"Biscoff Crumble · Biscoff Greek Yogurt · Banana & Dark Chocolate Ganache",layers:{top:"Biscoff Biscuit Crumble",cake:"Biscoff Greek Yogurt",base:"Banana, Dark Chocolate Ganache, Oreo Crumble"},prices:{mini:149,sm:250,md:420},color:"#F5EDE4",accent:"#8B6B42",tag:"Recommended",svg:{bc:"#3D3028",yc:"#E8D0A8",toppings:"biscoff"}},
  {id:103,name:"Mixed Berry Greek Cake",cat:"cake",desc:"Fresh Strawberry & Blueberry · Plain Greek Yogurt · Cookie Crumble",layers:{top:"Fresh Strawberry, Blueberry",cake:"Plain Greek Yogurt",base:"Pure Butter Cookie Crumble"},prices:{mini:189,sm:350,md:550},color:"#F5E0E8",accent:"#8A3F5B",tag:null,svg:{bc:"#D4B896",yc:"#FFF0F0",toppings:"mixedberry"}},
  {id:104,name:"Strawberry Greek Cake",cat:"cake",desc:"Fresh Strawberry · Berrylicious Greek Yogurt · Cookie Crumble",layers:{top:"Fresh Strawberry",cake:"Berrylicious Greek Yogurt",base:"Pure Butter Cookie Crumble"},prices:{mini:189,sm:350,md:550},color:"#FAEAEC",accent:"#D4566A",tag:null,svg:{bc:"#D4B896",yc:"#FFD6DE",toppings:"strawberry"}},
];
const CS=[{id:"mini",name:"Mini",weight:"8 cm",sub:"1 คน"},{id:"sm",name:"Small",weight:"10.8 cm",sub:"1-2 คน"},{id:"md",name:"Medium",weight:"12.5 cm",sub:"2-3 คน"}];

function App(){
  const[screen,setScreen]=useState("menu");
  const[activeTab,setActiveTab]=useState("yogurt");
  const[activeCat,setActiveCat]=useState("all");
  const[selProd,setSelProd]=useState(null);
  const[selSize,setSelSize]=useState(null);
  const[cart,setCart]=useState([]);
  const[cartOpen,setCartOpen]=useState(false);
  const[notif,setNotif]=useState(null);
  const[vis,setVis]=useState(true);
  const[bk,setBk]=useState(0);
  const[anim,setAnim]=useState(false);
  const[qty,setQty]=useState(1);

  const go=useCallback(s=>{setVis(false);setTimeout(()=>{setScreen(s);setVis(true)},250)},[]);
  const customize=p=>{setSelProd(p);setQty(1);setSelSize(p.cat==="cake"?"mini":"sm");go("customize")};
  const price=()=>selProd&&selSize?(selProd.prices[selSize]||0)*qty:0;

  const add=()=>{
    const sizes=selProd.cat==="cake"?CS:YS;
    const item={cid:Date.now(),prod:selProd,size:sizes.find(s=>s.id===selSize),qty,price:price()};
    setAnim(true);
    setTimeout(()=>{setCart(p=>[...p,item]);setBk(k=>k+1);setAnim(false);setNotif(selProd.name+" เพิ่มแล้ว!");setTimeout(()=>setNotif(null),2000);go("menu")},400);
  };

  const remove=id=>setCart(p=>p.filter(i=>i.cid!==id));
  const total=cart.reduce((s,i)=>s+i.price,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);
  const filtered=activeCat==="all"?YP:YP.filter(p=>p.cat===activeCat);
  const[showSummary,setShowSummary]=useState(false);
  const[copied,setCopied]=useState(false);
  const[custName,setCustName]=useState("");
  const[custPhone,setCustPhone]=useState("");
  const[custAddress,setCustAddress]=useState("");
  const[custNote,setCustNote]=useState("");
  const[checkoutStep,setCheckoutStep]=useState("form"); // form | payment | done
  const[submitting,setSubmitting]=useState(false);
  const[orderNo,setOrderNo]=useState("");
  const[acctCopied,setAcctCopied]=useState(false);

  // ⚙️ ตั้งค่า: วาง URL ของ Google Apps Script Web App ตรงนี้ (ดูวิธีในคู่มือ)
  const SHEETS_URL="https://script.google.com/macros/s/AKfycbzeypvhiynuf8J-qz5LgDM7_beARiw7fhhRgsK_oKpg24v5BeZQ032_YKKAiJ4aH_Il1w/exec";
  const BANK={name:"ธนาคารกสิกรไทย",acct:"063-3-12323-3",holder:"Zerotrans Bakery"};

  const buildOrderText=()=>{
    let txt="";
    cart.forEach((item,i)=>{
      txt+=(i+1)+". "+item.prod.name+" | "+item.size.name+" ("+item.size.weight+") × "+item.qty+" = ฿"+item.price+"\n";
    });
    return txt;
  };

  const checkout=()=>{
    setCheckoutStep("form");
    setShowSummary(true);
  };

  const submitOrder=async()=>{
    if(!custName.trim()||!custPhone.trim()||!custAddress.trim()){
      alert("กรุณากรอกชื่อ เบอร์โทร และที่อยู่จัดส่งให้ครบ");
      return;
    }
    setSubmitting(true);
    const oNo="ZT"+Date.now().toString().slice(-8);
    setOrderNo(oNo);
    const payload={
      orderNo:oNo,
      date:new Date().toLocaleString("th-TH"),
      name:custName,phone:custPhone,address:custAddress,note:custNote,
      items:buildOrderText(),total:total,
    };
    if(SHEETS_URL&&!SHEETS_URL.includes("PASTE_YOUR")){
      try{
        await fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
      }catch(e){console.error("Sheet submit failed",e)}
    }
    setSubmitting(false);
    setCheckoutStep("payment");
  };

  const finishOrder=()=>{
    setCart([]);setShowSummary(false);setCheckoutStep("form");
    setCustName("");setCustPhone("");setCustAddress("");setCustNote("");
    setNotif("ส่งออเดอร์เรียบร้อย!");
    setTimeout(()=>setNotif(null),2500);
  };

  const openMessenger=()=>{
    window.open("https://m.me/zerotransbakery","_blank");
  };

  const ProductIcon=({p,w,h})=>{
    if(p.cat==="cake") return <CakeSVG {...p.svg} id={p.id}/>;
    return <YogurtCupSVG {...p.svg} id={p.id}/>;
  };

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      {notif&&<div className="notification" style={{position:"absolute",top:12,left:"50%",zIndex:500,background:"#1565C0",color:"#fff",padding:"10px 24px",borderRadius:30,fontSize:13,fontWeight:600,boxShadow:"0 8px 24px rgba(21,101,192,0.35)",whiteSpace:"nowrap"}}>✓ {notif}</div>}

      <header style={{background:"rgba(250,251,253,0.94)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderBottom:"1px solid #e2e8f0",zIndex:100,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {screen!=="menu"&&<button onClick={()=>go("menu")} style={{background:"none",border:"none",fontSize:18,color:"#1565C0",cursor:"pointer",padding:"4px 8px",borderRadius:8}}>←</button>}
            <div>
              <h1 style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:700,color:"#1565C0",letterSpacing:1}}>ZEROTRANS</h1>
              <p style={{fontSize:9,color:"#94a3b8",letterSpacing:1.5,textTransform:"uppercase"}}>Greek Yogurt · โคราช</p>
            </div>
          </div>
          <button onClick={()=>setCartOpen(true)} style={{background:"none",border:"none",cursor:"pointer",position:"relative",padding:8}}>
            <span style={{fontSize:22}}>🛒</span>
            {count>0&&<span className="cart-badge-pulse" key={bk} style={{position:"absolute",top:0,right:0,background:"#1565C0",color:"#fff",fontSize:10,fontWeight:700,minWidth:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{count}</span>}

                  </div>
                </div>
                <button onClick={async()=>{try{await navigator.clipboard.writeText(BANK.acct.replace(/-/g,""));setAcctCopied(true);setTimeout(()=>setAcctCopied(false),2000)}catch(e){}}} style={{width:"100%",background:"#f1f5f9",color:"#334155",border:"1.5px solid #e2e8f0",padding:12,borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:10}}>{acctCopied?"✓ คัดลอกแล้ว":"📋 คัดลอกเลขบัญชี"}</button>
                <div style={{background:"#FFFBEB",borderRadius:10,padding:"10px 12px",border:"1px solid #FEF3C7",marginBottom:4}}>
                  <p style={{fontSize:11,color:"#92400E",lineHeight:1.6}}>💡 <strong>ขั้นตอนสุดท้าย:</strong> โอนเงินตามยอด แล้วส่งสลิปพร้อมแจ้งเลขออเดอร์ <strong>#{orderNo}</strong> ทาง Messenger เพื่อยืนยันการชำระ</p>
                </div>
              </div>
              <button onClick={openMessenger} style={{width:"100%",background:"#0084FF",color:"#fff",border:"none",padding:14,borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:10}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.91 1.19 5.44 3.14 7.17.16.14.26.35.27.57l.05 1.78c.02.57.6.94 1.12.71l1.98-.87c.17-.08.36-.09.53-.04.91.25 1.88.38 2.91.38 5.64 0 10-4.13 10-9.7S17.64 2 12 2z"/></svg>
                ส่งสลิปทาง Messenger
              </button>
              <button onClick={finishOrder} style={{width:"100%",background:"none",color:"#94a3b8",border:"none",padding:8,fontSize:12,cursor:"pointer",marginTop:2}}>เสร็จสิ้น</button>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
