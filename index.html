<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:#E8EDF2;display:flex;justify-content:center;align-items:center;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  #root{width:100%;max-width:480px;height:100vh;height:100dvh;background:#FAFBFD;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(27,58,75,0.12)}
  @media(min-width:481px){#root{height:94vh;border-radius:24px;border:1px solid #dde3ea}}
  .product-card{transition:transform .22s ease,box-shadow .22s ease;cursor:pointer}
  .product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(27,58,75,0.12)}
  .product-card:active{transform:scale(.97)}
  .size-btn{transition:all .18s ease;cursor:pointer}.size-btn:active{transform:scale(.95)}
  .cart-drawer{transition:transform .35s cubic-bezier(.32,.72,0,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}.cart-item-enter{animation:slideIn .3s ease forwards}
  @keyframes flyToCart{0%{transform:scale(1);opacity:1}50%{transform:scale(.6) translateY(-40px);opacity:.7}100%{transform:scale(.2) translateY(-80px) translateX(60px);opacity:0}}.fly-animation{animation:flyToCart .5s ease-in forwards}
  @keyframes notifSlide{0%{transform:translateX(-50%) translateY(-100%);opacity:0}15%{transform:translateX(-50%) translateY(0);opacity:1}85%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-100%);opacity:0}}.notification{animation:notifSlide 2s ease forwards}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}.cart-badge-pulse{animation:pulse .4s ease}
  .add-btn{transition:all .2s ease}.add-btn:active{transform:scale(.95);filter:brightness(.92)}
  .tab-btn{transition:all .2s ease;cursor:pointer}
  .cat-pill{transition:all .18s ease;cursor:pointer;white-space:nowrap}.cat-pill:active{transform:scale(.95)}
  .remove-btn{transition:all .15s ease}.remove-btn:active{background:#fee2e2}
  .checkout-btn{transition:all .2s ease}.checkout-btn:active{filter:brightness(.9);transform:scale(.98)}
  .scroll-area::-webkit-scrollbar{width:4px}.scroll-area::-webkit-scrollbar-track{background:transparent}.scroll-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"12px 20px"}}>
              {CP.map(p=>(
                <div key={p.id} className="product-card" onClick={()=>customize(p)} style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.05)",border:"1px solid #eef1f5"}}>
                  <div style={{height:130,display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${p.color},${p.accent}15)`,position:"relative"}}>
                    <ProductIcon p={p}/>
                    {p.tag&&<span style={{position:"absolute",top:8,right:8,fontSize:8,fontWeight:700,color:"#fff",padding:"2px 8px",borderRadius:10,background:p.accent,letterSpacing:.3}}>{p.tag}</span>}
                  </div>
                  <div style={{padding:"10px 12px 12px"}}>
                    <h4 style={{fontFamily:"'Fraunces',serif",fontSize:13,fontWeight:600,color:"#1e293b",marginBottom:4,lineHeight:1.3}}>{p.name}</h4>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:14,fontWeight:700,color:"#1565C0",fontFamily:"'Fraunces',serif"}}>฿{p.prices.mini}+</span>
                      <span style={{fontSize:10,color:"#1565C0",fontWeight:600}}>เลือก →</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {screen==="customize"&&selProd&&(
          <div style={{paddingBottom:110}}>
            <div style={{padding:"24px 22px",textAlign:"center",background:`linear-gradient(160deg,${selProd.color},${selProd.accent}18)`}}>
              <div style={{display:"inline-block",transform:selProd.img?"none":(selProd.cat==="cake"?"scale(1.4)":"scale(1.3)")}}><ProductIcon p={selProd} big={true}/></div>
              <h2 style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:700,color:"#1e293b",marginTop:14}}>{selProd.name}</h2>
              <p style={{fontSize:12,color:"#64748b",lineHeight:1.5,marginTop:6,maxWidth:300,margin:"6px auto 0"}}>{selProd.desc}</p>
              {selProd.cat==="no-sugar"&&<span style={{display:"inline-block",marginTop:8,background:"#dcfce7",color:"#166534",fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:10}}>✓ No Sugar Added</span>}
              {selProd.cat==="sugar"&&<span style={{display:"inline-block",marginTop:8,background:"#fef3c7",color:"#92400e",fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:10}}>Have Sugar Added</span>}
            </div>
            {selProd.cat==="cake"&&selProd.layers&&(
              <div style={{margin:"16px 22px 0",background:"#fafbfd",borderRadius:12,padding:"14px 16px",border:"1px solid #eef1f5"}}>
                <p style={{fontSize:11,fontWeight:600,color:"#1565C0",marginBottom:8}}>Layers</p>
                {[{l:"TOP",v:selProd.layers.top},{l:"CAKE",v:selProd.layers.cake},{l:"BASE",v:selProd.layers.base}].map((x,i)=>(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:i<2?6:0,alignItems:"baseline"}}>
                    <span style={{fontSize:9,fontWeight:700,color:"#94a3b8",width:34,flexShrink:0}}>{x.l}</span>
                    <span style={{fontSize:12,color:"#475569"}}>{x.v}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{padding:"18px 22px 0"}}>
              <h3 style={{fontFamily:"'Fraunces',serif",fontSize:15,fontWeight:600,color:"#1e293b",marginBottom:10}}>เลือกขนาด</h3>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {(selProd.cat==="cake"?CS:YS).map(s=>(
                  <button key={s.id} className="size-btn" onClick={()=>setSelSize(s.id)} style={{flex:1,minWidth:selProd.cat==="cake"?"30%":"22%",padding:"12px 8px",borderRadius:12,border:"2px solid",display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:selSize===s.id?"#1565C0":"#f8fafc",color:selSize===s.id?"#fff":"#475569",borderColor:selSize===s.id?"#1565C0":"#e2e8f0"}}>
                    <span style={{fontSize:14,fontWeight:700,fontFamily:"'Fraunces',serif"}}>{s.name}</span>
                    <span style={{fontSize:10,opacity:.7}}>{s.weight}</span>
                    <span style={{fontSize:13,fontWeight:700,marginTop:2}}>฿{selProd.prices[s.id]}</span>
                  </button>
                ))}
              </div>
            </div>
            <div style={{padding:"18px 22px 0"}}>
              <h3 style={{fontFamily:"'Fraunces',serif",fontSize:15,fontWeight:600,color:"#1e293b",marginBottom:10}}>จำนวน</h3>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <button onClick={()=>setQty(Math.max(1,qty-1))} style={{width:40,height:40,borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569"}}>−</button>
                <span style={{fontSize:22,fontWeight:700,color:"#1e293b",fontFamily:"'Fraunces',serif",minWidth:30,textAlign:"center"}}>{qty}</span>
                <button onClick={()=>setQty(qty+1)} style={{width:40,height:40,borderRadius:12,border:"1.5px solid #1565C0",background:"#EBF5FF",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#1565C0"}}>+</button>
              </div>
            </div>
            <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:90}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 22px",background:"rgba(250,251,253,0.96)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderTop:"1px solid #e2e8f0"}}>
                <div>
                  <span style={{fontSize:11,color:"#94a3b8"}}>รวม</span>
                  <p style={{fontSize:22,fontWeight:700,fontFamily:"'Fraunces',serif",color:"#1565C0"}}>฿{price()}</p>
                </div>
                <button className="add-btn" onClick={add} disabled={anim} style={{color:"#fff",border:"none",padding:"14px 28px",borderRadius:12,fontSize:15,fontWeight:600,cursor:"pointer",background:anim?"#94a3b8":"#1565C0"}}>{anim?"กำลังเพิ่ม...":"เพิ่มลงตะกร้า"}</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {cartOpen&&<div onClick={()=>setCartOpen(false)} style={{position:"absolute",inset:0,background:"rgba(21,101,192,0.18)",zIndex:200}}/>}
      <div className="cart-drawer" style={{position:"absolute",top:0,right:0,bottom:0,width:"min(380px,92%)",background:"#fff",zIndex:300,display:"flex",flexDirection:"column",boxShadow:"-8px 0 40px rgba(21,101,192,0.12)",transform:cartOpen?"translateX(0)":"translateX(100%)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px",borderBottom:"1px solid #eef1f5"}}>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:600,color:"#1565C0"}}>ตะกร้าของคุณ</h2>
          <button onClick={()=>setCartOpen(false)} style={{background:"none",border:"none",fontSize:18,color:"#94a3b8",cursor:"pointer"}}>✕</button>
        </div>
        {cart.length===0?(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40}}>
            <span style={{fontSize:48,marginBottom:12}}>🥣</span><p style={{color:"#94a3b8"}}>ยังไม่มีสินค้าในตะกร้า</p>
          </div>
        ):(
          <div className="scroll-area" style={{flex:1,overflowY:"auto",padding:"10px 18px"}}>
            {cart.map((item,i)=>(
              <div key={item.cid} className="cart-item-enter" style={{display:"flex",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #f1f5f9",animationDelay:i*.05+"s",gap:8}}>
                <div style={{width:36,height:36,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><ProductIcon p={item.prod}/></div>
                <div style={{flex:1}}>
                  <strong style={{fontFamily:"'Fraunces',serif",fontWeight:600,fontSize:13,color:"#1e293b"}}>{item.prod.name}</strong>
                  <p style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{item.size.name} ({item.size.weight}) × {item.qty}</p>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:600,color:"#1e293b",fontSize:14}}>฿{item.price}</span>
                  <button className="remove-btn" onClick={()=>remove(item.cid)} style={{background:"#fef2f2",border:"none",color:"#ef4444",width:24,height:24,borderRadius:7,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}
        {cart.length>0&&(
          <div style={{padding:"14px 22px 22px",borderTop:"1px solid #eef1f5"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{color:"#64748b",fontSize:14}}>รวมทั้งหมด</span>
              <span style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:700,color:"#1565C0"}}>฿{total}</span>
            </div>
            <button className="checkout-btn" onClick={checkout} style={{width:"100%",background:"#1565C0",color:"#fff",border:"none",padding:15,borderRadius:14,fontSize:15,fontWeight:600,cursor:"pointer"}}>สั่งซื้อ & ชำระเงิน →</button>
            <p style={{fontSize:10,color:"#94a3b8",textAlign:"center",marginTop:8,lineHeight:1.5}}>กรอกที่อยู่ → โอนเงิน → ออเดอร์ส่งถึงร้านอัตโนมัติ</p>
          </div>
        )}
      </div>
      {anim&&selProd&&<div className="fly-animation" style={{position:"absolute",top:"45%",left:"45%",zIndex:400,pointerEvents:"none"}}><span style={{fontSize:36}}>🛒</span></div>}

      {/* Checkout Modal */}
      {showSummary&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>checkoutStep!=="payment"&&setShowSummary(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:"20px 18px",width:"100%",maxWidth:380,maxHeight:"88%",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",overflow:"hidden"}}>

            {/* STEP 1: Customer info form */}
            {checkoutStep==="form"&&<>
              <div style={{textAlign:"center",marginBottom:12}}>
                <span style={{fontSize:32}}>📝</span>
                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:"#1e293b",marginTop:4}}>ข้อมูลจัดส่ง</h3>
              </div>
              <div className="scroll-area" style={{flex:1,overflowY:"auto"}}>
                <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",marginBottom:12,border:"1px solid #eef1f5"}}>
                  {cart.map((item,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569",marginBottom:i<cart.length-1?4:0}}>
                      <span>{item.prod.name} · {item.size.name} × {item.qty}</span>
                      <span style={{fontWeight:600}}>฿{item.price}</span>
                    </div>
                  ))}
                  <div style={{borderTop:"1px dashed #cbd5e1",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,color:"#1565C0"}}>
                    <span>รวม</span><span>฿{total}</span>
                  </div>
                </div>
                <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>ชื่อ-นามสกุล *</label>
                <input value={custName} onChange={e=>setCustName(e.target.value)} placeholder="ชื่อผู้รับ" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,marginBottom:10,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>เบอร์โทร *</label>
                <input value={custPhone} onChange={e=>setCustPhone(e.target.value)} placeholder="08X-XXX-XXXX" type="tel" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,marginBottom:10,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>ที่อยู่จัดส่ง *</label>
                <textarea value={custAddress} onChange={e=>setCustAddress(e.target.value)} placeholder="บ้านเลขที่ ซอย ถนน ตำบล อำเภอ จังหวัด รหัสไปรษณีย์" rows="3" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,marginBottom:10,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"none"}}/>
                <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>หมายเหตุ (ถ้ามี)</label>
                <input value={custNote} onChange={e=>setCustNote(e.target.value)} placeholder="เช่น ส่งช่วงเย็น" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,marginBottom:4,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
              </div>
              <button onClick={submitOrder} disabled={submitting} style={{width:"100%",background:submitting?"#94a3b8":"#1565C0",color:"#fff",border:"none",padding:14,borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",marginTop:12}}>{submitting?"กำลังส่งออเดอร์...":"ยืนยันออเดอร์ → ชำระเงิน"}</button>
              <button onClick={()=>setShowSummary(false)} style={{width:"100%",background:"none",color:"#94a3b8",border:"none",padding:8,fontSize:12,cursor:"pointer",marginTop:2}}>ยกเลิก</button>
            </>}

            {/* STEP 2: Payment */}
            {checkoutStep==="payment"&&<>
              <div style={{textAlign:"center",marginBottom:12}}>
                <span style={{fontSize:32}}>💳</span>
                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:"#1e293b",marginTop:4}}>ชำระเงิน</h3>
                <p style={{fontSize:11,color:"#16a34a",fontWeight:600,marginTop:4}}>✓ ออเดอร์ #{orderNo} ส่งถึงร้านแล้ว</p>
              </div>
              <div className="scroll-area" style={{flex:1,overflowY:"auto"}}>
                <div style={{background:"linear-gradient(135deg,#0A8043,#16a34a)",borderRadius:14,padding:"18px 16px",color:"#fff",marginBottom:12}}>
                  <p style={{fontSize:11,opacity:.85,marginBottom:2}}>{BANK.name}</p>
                  <p style={{fontSize:22,fontWeight:700,letterSpacing:1,fontFamily:"'Fraunces',serif"}}>{BANK.acct}</p>
                  <p style={{fontSize:12,opacity:.9,marginTop:2}}>{BANK.holder}</p>
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.25)",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,opacity:.85}}>ยอดโอน</span>
                    <span style={{fontSize:24,fontWeight:700,fontFamily:"'Fraunces',serif"}}>฿{total}</span>
                  </div>
                </div>
                <button onClick={async()=>{try{await navigator.clipboard.writeText(BANK.acct.replace(/-/g,""));setAcctCopied(true);setTimeout(()=>setAcctCopied(false),2000)}catch(e){}}} style={{width:"100%",background:"#f1f5f9",color:"#334155",border:"1.5px solid #e2e8f0",padding:12,borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:10}}>{acctCopied?"✓ คัดลอกแล้ว":"📋 คัดลอกเลขบัญชี"}</button>
                <div style={{background:"#FFFBEB",borderRadius:10,padding:"10px 12px",border:"1px solid #FEF3C7",marginBottom:4}}>
                  <p style={{fontSize:11,color:"#92400E",lineHeight:1.6}}>💡 <strong>ขั้นตอนสุดท้าย:</strong> โอนเงินตามยอด แล้วส่งสลิปพร้อมแจ้งเลขออเดอร์ <strong>#{orderNo}</strong> ทาง Messenger เพื่อยืนยันการชำระ</p>
                </div>
              </div>
              <button onClick={openMessenger} style={{width:"100%",background:"#0084FF",color:"#fff",border:"none",padding:14,borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:10}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.91 1.19 5.44 3.14 7.17.16.14.26.35.27.57l.05 1.78c.02.57.6.94 1.12.71l1.98-.87c.17-.08.36-.09.53-.04.91.25 1.88.38 2.91.38 5.64 0 10-4.13 10-9.7S17.64 2 12 2z"/></svg>
                ส่งสลิปทาง Messenger
              </button>
              <button onClick={finishOrder} style={{width:"100%",background:"none",color:"#94a3b8",border:"none",padding:8,fontSize:12,cursor:"pointer",marginTop:2}}>เสร็จสิ้น</button>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
