<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:#E8EDF2;display:flex;justify-content:center;align-items:center;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  #root{width:100%;max-width:480px;height:100vh;height:100dvh;background:#FAFBFD;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(27,58,75,0.12)}
  @media(min-width:481px){#root{height:94vh;border-radius:24px;border:1px solid #dde3ea}}
  .product-card{transition:transform .22s ease,box-shadow .22s ease;cursor:pointer}
  .product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(27,58,75,0.12)}
  .product-card:active{transform:scale(.97)}
  .size-btn{transition:all .18s ease;cursor:pointer}.size-btn:active{transform:scale(.95)}
  .cart-drawer{transition:transform .35s cubic-bezier(.32,.72,0,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}.cart-item-enter{animation:slideIn .3s ease forwards}
  @keyframes flyToCart{0%{transform:scale(1);opacity:1}50%{transform:scale(.6) translateY(-40px);opacity:.7}100%{transform:scale(.2) translateY(-80px) translateX(60px);opacity:0}}.fly-animation{animation:flyToCart .5s ease-in forwards}
  @keyframes notifSlide{0%{transform:translateX(-50%) translateY(-100%);opacity:0}15%{transform:translateX(-50%) translateY(0);opacity:1}85%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-100%);opacity:0}}.notification{animation:notifSlide 2s ease forwards}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}.cart-badge-pulse{animation:pulse .4s ease}
  .add-btn{transition:all .2s ease}.add-btn:active{transform:scale(.95);filter:brightness(.92)}
  .tab-btn{transition:all .2s ease;cursor:pointer}
  .cat-pill{transition:all .18s ease;cursor:pointer;white-space:nowrap}.cat-pill:active{transform:scale(.95)}
  .remove-btn{transition:all .15s ease}.remove-btn:active{background:#fee2e2}
  .checkout-btn{transition:all .2s ease}.checkout-btn:active{filter:brightness(.9);transform:scale(.98)}
  .scroll-area::-webkit-scrollbar{width:4px}.scroll-area::-webkit-scrollbar-track{background:transparent}.scroll-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>

  {id:6,img:"hershey",name:"Hershey Black Forest",cat:"sugar",desc:"ช็อกโกแลตเข้มข้น ความหอมหวานจาก HERSHEY ซอสเบอร์รี่สดของร้าน",prices:{sm:89,md:200,lg:480,kilo:790},color:"#EAE0E0",accent:"#5C3A3A",tag:"Premium",svg:{yc:"#8B6050",yc2:"#6B4030",toppings:"chocolate"}},

const CP=[
  {id:101,img:"bb_cake",name:"Blueberry Greek Cake",cat:"cake",desc:"Fresh Blueberry · Blueberry Greek Yogurt · Pure Butter Oreo Crumble",layers:{top:"Fresh Blueberry",cake:"Blueberry Greek Yogurt",base:"Pure Butter Oreo Crumble"},prices:{mini:169,sm:280,md:450},color:"#E8E0F5",accent:"#4A3F8A",tag:"Bestseller",svg:{bc:"#3D3028",yc:"#C8B0E8",toppings:"blueberry"}},
  {id:102,img:"banoffee",name:"Banoffee Biscoff",cat:"cake",desc:"Biscoff Crumble · Biscoff Greek Yogurt · Banana & Dark Chocolate Ganache",layers:{top:"Biscoff Biscuit Crumble",cake:"Biscoff Greek Yogurt",base:"Banana, Dark Chocolate Ganache, Oreo Crumble"},prices:{mini:149,sm:250,md:420},color:"#F5EDE4",accent:"#8B6B42",tag:"Recommended",svg:{bc:"#3D3028",yc:"#E8D0A8",toppings:"biscoff"}},
  {id:103,img:"mixed_cake",name:"Mixed Berry Greek Cake",cat:"cake",desc:"Fresh Strawberry & Blueberry · Plain Greek Yogurt · Cookie Crumble",layers:{top:"Fresh Strawberry, Blueberry",cake:"Plain Greek Yogurt",base:"Pure Butter Cookie Crumble"},prices:{mini:189,sm:350,md:550},color:"#F5E0E8",accent:"#8A3F5B",tag:null,svg:{bc:"#D4B896",yc:"#FFF0F0",toppings:"mixedberry"}},
  {id:104,img:"strawberry_cake",name:"Strawberry Greek Cake",cat:"cake",desc:"Fresh Strawberry · Berrylicious Greek Yogurt · Cookie Crumble",layers:{top:"Fresh Strawberry",cake:"Berrylicious Greek Yogurt",base:"Pure Butter Cookie Crumble"},prices:{mini:189,sm:350,md:550},color:"#FAEAEC",accent:"#D4566A",tag:null,svg:{bc:"#D4B896",yc:"#FFD6DE",toppings:"strawberry"}},
];
const CS=[{id:"mini",name:"Mini",weight:"8 cm",sub:"1 คน"},{id:"sm",name:"Small",weight:"10.8 cm",sub:"1-2 คน"},{id:"md",name:"Medium",weight:"12.5 cm",sub:"2-3 คน"}];

function App(){
  const[screen,setScreen]=useState("menu");
  const[activeTab,setActiveTab]=useState("yogurt");
  const[activeCat,setActiveCat]=useState("all");
  const[selProd,setSelProd]=useState(null);
  const[selSize,setSelSize]=useState(null);
  const[cart,setCart]=useState([]);
  const[cartOpen,setCartOpen]=useState(false);
  const[notif,setNotif]=useState(null);
  const[vis,setVis]=useState(true);
  const[bk,setBk]=useState(0);
  const[anim,setAnim]=useState(false);
  const[qty,setQty]=useState(1);

  const go=useCallback(s=>{setVis(false);setTimeout(()=>{setScreen(s);setVis(true)},250)},[]);
  const customize=p=>{setSelProd(p);setQty(1);setSelSize(p.cat==="cake"?"mini":"sm");go("customize")};
  const price=()=>selProd&&selSize?(selProd.prices[selSize]||0)*qty:0;

  const add=()=>{
    const sizes=selProd.cat==="cake"?CS:YS;
    const item={cid:Date.now(),prod:selProd,size:sizes.find(s=>s.id===selSize),qty,price:price()};
    setAnim(true);
    setTimeout(()=>{setCart(p=>[...p,item]);setBk(k=>k+1);setAnim(false);setNotif(selProd.name+" เพิ่มแล้ว!");setTimeout(()=>setNotif(null),2000);go("menu")},400);
  };

  const remove=id=>setCart(p=>p.filter(i=>i.cid!==id));
  const changeQty=(cid,delta)=>setCart(p=>p.map(i=>{
    if(i.cid!==cid) return i;
    const newQty=Math.max(1,i.qty+delta);
    const unit=i.price/i.qty;
    return {...i,qty:newQty,price:unit*newQty};
  }));
  const total=cart.reduce((s,i)=>s+i.price,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);
  const filtered=activeCat==="all"?YP:YP.filter(p=>p.cat===activeCat);

  const[custAddress,setCustAddress]=useState("");
  const[custNote,setCustNote]=useState("");
  const[custFb,setCustFb]=useState("");
  const[addrData,setAddrData]=useState(null); // null=not loaded | "failed" | array
  const[addrLoading,setAddrLoading]=useState(false);
  const[addrNo,setAddrNo]=useState("");
  const[provId,setProvId]=useState("");
  const[ampId,setAmpId]=useState("");
  const[tamId,setTamId]=useState("");

  const loadAddr=()=>{
    if(Array.isArray(addrData))return;
    const out=THAI_ADDR.map((p,pi)=>({id:pi+1,name_th:p[0],amphure:p[1].map((a,ai)=>({id:(pi+1)*1000+ai,name_th:a[0],tambon:a[1].map((t,ti)=>({id:(pi+1)*1000000+ai*1000+ti,name_th:t[0],zip_code:t[1]}))}))}));
    setAddrData(out);
  };

  const provObj=(Array.isArray(addrData)?addrData:[]).find(p=>String(p.id)===provId);
  const ampList=provObj?provObj.amphure:[];
  const ampObj=ampList.find(a=>String(a.id)===ampId);
  const tamList=ampObj?ampObj.tambon:[];
  const tamObj=tamList.find(t=>String(t.id)===tamId);
  const zipCode=tamObj?String(tamObj.zip_code):"";
  const fullAddress=()=>{
    if(Array.isArray(addrData)&&provObj&&ampObj&&tamObj){
      return addrNo+" ต."+tamObj.name_th+" อ."+ampObj.name_th+" จ."+provObj.name_th+" "+zipCode;
    }
    return custAddress;
  };
  const[delivDate,setDelivDate]=useState("");
  const[delivType,setDelivType]=useState("pickup"); // pickup | delivery
  const[courier,setCourier]=useState("nim"); // nim | inter
  const COURIERS={nim:{name:"Nim Express",fee:200},inter:{name:"Inter Express",fee:250}};
  const shipFee=delivType==="delivery"?COURIERS[courier].fee:0;
  const grandTotal=()=>total+shipFee;
  const[checkoutStep,setCheckoutStep]=useState("form"); // form | payment | done
  const[submitting,setSubmitting]=useState(false);
  const[orderNo,setOrderNo]=useState("");
  const[acctCopied,setAcctCopied]=useState(false);
  const[slipFile,setSlipFile]=useState(null);
  const[slipPreview,setSlipPreview]=useState(null);
  const[slipStatus,setSlipStatus]=useState("idle"); // idle | uploading | done

  // ⚙️ ตั้งค่า: วาง URL ของ Google Apps Script Web App ตรงนี้ (ดูวิธีในคู่มือ)
  const SHEETS_URL="https://script.google.com/macros/s/AKfycbz9MaXfWIP9g1tA3U034fRnVIMFEMj4q8wyXtfQ-iQ8ccd0a15meqbqAKj0Q7JEB2hpSA/exec";
  const BANK={name:"ธนาคารกสิกรไทย",acct:"063-3-12323-3",holder:"Zerotrans Bakery"};

  const buildOrderText=()=>{
    let txt="";
    cart.forEach((item,i)=>{
      txt+=(i+1)+". "+item.prod.name+" | "+item.size.name+" ("+item.size.weight+") × "+item.qty+" = ฿"+item.price+"\n";
    });
    return txt;
  };

  const checkout=()=>{
    setCheckoutStep("form");
    setShowSummary(true);
    loadAddr();
  };

  const submitOrder=async()=>{
    if(!custName.trim()||!custPhone.trim()){
      alert("กรุณากรอกชื่อ และเบอร์โทร");
      return;
    }
    if(!delivDate){
      alert("กรุณาเลือกวันที่รับสินค้า/จัดส่ง");
      return;
    }
    if(delivType==="delivery"){
      if(Array.isArray(addrData)){
        if(!addrNo.trim()){alert("กรุณากรอกบ้านเลขที่ / ถนน");return}
        if(!provId){alert("กรุณาเลือกจังหวัด");return}
        if(!ampId){alert("กรุณาเลือกอำเภอ");return}
        if(!tamId){alert("กรุณาเลือกตำบล");return}
      }else if(!custAddress.trim()){
        alert("กรุณากรอกที่อยู่จัดส่ง");
        return;
      }
    }
    setSubmitting(true);
    const oNo="ZT"+Date.now().toString().slice(-8);
    setOrderNo(oNo);
    const payload={
      orderNo:oNo,
      date:new Date().toLocaleString("th-TH"),
      name:custName,phone:custPhone,facebook:custFb,address:delivType==="delivery"?fullAddress():"",note:custNote,
      delivDate:delivDate,
      delivMethod:delivType==="pickup"?"รับหน้าร้าน":"จัดส่ง "+COURIERS[courier].name+" (฿"+COURIERS[courier].fee+")",
      items:buildOrderText(),total:grandTotal(),
    };
    if(SHEETS_URL&&!SHEETS_URL.includes("PASTE_YOUR")){
      try{
        await fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
      }catch(e){console.error("Sheet submit failed",e)}
    }
    setSubmitting(false);
    setCheckoutStep("payment");
  };

  const finishOrder=()=>{
    setCart([]);setShowSummary(false);setCheckoutStep("form");
    setCustName("");setCustPhone("");setCustFb("");setCustAddress("");setCustNote("");setDelivDate("");setDelivType("pickup");setCourier("nim");setSlipFile(null);setSlipPreview(null);setSlipStatus("idle");setAddrNo("");setProvId("");setAmpId("");setTamId("");
    setNotif("ส่งออเดอร์เรียบร้อย!");
    setTimeout(()=>setNotif(null),2500);
  };

  const openMessenger=()=>{
    window.open("https://m.me/zerotransbakery","_blank");
  };

  const saveQR=async()=>{
    try{
      const res=await fetch(IMAGES.payqr);
      const blob=await res.blob();
      const file=new File([blob],"zerotrans-qr-payment.jpg",{type:blob.type||"image/jpeg"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:"Zerotrans QR Payment"});
        return;
      }
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download="zerotrans-qr-payment.jpg";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),3000);
    }catch(err){
      if(err&&err.name==="AbortError")return;
      alert("เซฟอัตโนมัติไม่สำเร็จ — กดค้างที่รูป QR แล้วเลือก 'เพิ่มลงในรูปภาพ' แทนได้ครับ");
    }
  };

  const pickSlip=(e)=>{
    const f=e.target.files[0];
    if(!f) return;
    if(f.size>5*1024*1024){alert("ไฟล์ใหญ่เกิน 5MB กรุณาเลือกรูปใหม่");return}
    setSlipFile(f);
    const reader=new FileReader();
    reader.onload=ev=>setSlipPreview(ev.target.result);
    reader.readAsDataURL(f);
  };

  const uploadSlip=async()=>{
    if(!slipPreview){alert("กรุณาแนบรูปสลิปก่อน");return}
    setSlipStatus("uploading");
    try{
      await fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({type:"slip",orderNo:orderNo,name:custName,slip:slipPreview})});
      setSlipStatus("done");
    }catch(e){
      setSlipStatus("idle");
      alert("ส่งสลิปไม่สำเร็จ กรุณาลองใหม่ หรือส่งทาง Messenger แทน");
    }
  };

  const ProductIcon=({p,big,small})=>{
    const px=small?44:(big?150:90);
    if(p.img&&IMAGES[p.img]) return <img src={IMAGES[p.img]} style={{width:px,height:px,objectFit:"contain",borderRadius:8}} alt={p.name}/>;
    const inner=p.cat==="cake"?<CakeSVG {...p.svg} id={p.id+"_"+(small?"s":big?"b":"m")}/>:<YogurtCupSVG {...p.svg} id={p.id+"_"+(small?"s":big?"b":"m")}/>;

    return inner;

        {screen==="menu"&&activeTab==="yogurt"&&(

              <p style={{fontSize:12,color:"rgba(255,255,255,0.7)",lineHeight:1.5}}>กรีกโยเกิร์ตพรีเมียม · ส่งเย็นทั่วประเทศ</p>

              {[{id:"all",l:"ทั้งหมด"},{id:"no-sugar",l:"No Sugar Added"},{id:"sugar",l:"Have Sugar Added"}].map(c=>(
                <button key={c.id} className="cat-pill" onClick={()=>setActiveCat(c.id)} style={{padding:"7px 16px",borderRadius:20,border:"1.5px solid",fontSize:12,fontWeight:600,background:activeCat===c.id?"#1565C0":"#fff",color:activeCat===c.id?"#fff":"#64748b",borderColor:activeCat===c.id?"#1565C0":"#e2e8f0"}}>{c.l}</button>

                {YS.map(s=>(<div key={s.id} style={{textAlign:"center",flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{s.weight}</div><div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{s.sub}</div></div>))}

            </div>
          </div>
        )}

        {screen==="menu"&&activeTab==="cake"&&(
          <div style={{paddingBottom:20}}>
            <div style={{background:"linear-gradient(135deg,#1565C0,#42A5F5)",padding:"28px 22px 24px"}}>

            {checkoutStep==="payment"&&<>
              <div style={{textAlign:"center",marginBottom:12}}>
                <span style={{fontSize:32}}>💳</span>
                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:"#1e293b",marginTop:4}}>ชำระเงิน</h3>
                <p style={{fontSize:11,color:"#16a34a",fontWeight:600,marginTop:4}}>✓ ออเดอร์ #{orderNo} ส่งถึงร้านแล้ว</p>
              </div>
              <div className="scroll-area" style={{flex:1,overflowY:"auto"}}>
                <p style={{fontSize:12,fontWeight:600,color:"#475569",marginBottom:8,textAlign:"center"}}>เลือกวิธีชำระเงิน</p>
                <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:14,padding:"14px 12px",marginBottom:12,textAlign:"center"}}>
                  <p style={{fontSize:12,fontWeight:700,color:"#1e293b",marginBottom:8}}>📱 สแกน QR จ่ายได้เลย (Thai QR / PromptPay)</p>
                  <img src={IMAGES.payqr} style={{width:"100%",maxWidth:340,borderRadius:10,display:"block",margin:"0 auto"}} alt="Thai QR Payment"/>
                  <p style={{fontSize:10,color:"#94a3b8",marginTop:6}}>รองรับทุกธนาคาร · PromptPay · Visa · Mastercard</p>
                  <button type="button" onClick={saveQR} style={{marginTop:10,background:"#1565C0",color:"#fff",border:"none",padding:"12px 24px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6}}>
                    ⬇️ เซฟ QR ลงเครื่อง
                  </button>
                  <p style={{fontSize:9,color:"#b0bac6",marginTop:6}}>บน iPhone/iPad: กดค้างที่รูป QR แล้วเลือก "เพิ่มลงในรูปภาพ" ก็ได้</p>
                </div>
                <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginBottom:8}}>— หรือโอนผ่านเลขบัญชี —</p>
                <div style={{background:"linear-gradient(135deg,#0A8043,#16a34a)",borderRadius:14,padding:"18px 16px",color:"#fff",marginBottom:12}}>
                  <p style={{fontSize:11,opacity:.85,marginBottom:2}}>{BANK.name}</p>
                  <p style={{fontSize:22,fontWeight:700,letterSpacing:1,fontFamily:"'Fraunces',serif"}}>{BANK.acct}</p>
                  <p style={{fontSize:12,opacity:.9,marginTop:2}}>{BANK.holder}</p>
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.25)",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,opacity:.85}}>ยอดโอน{shipFee>0?" (รวมค่าส่ง ฿"+shipFee+")":""}</span>
                    <span style={{fontSize:24,fontWeight:700,fontFamily:"'Fraunces',serif"}}>฿{grandTotal()}</span>
                  </div>
                </div>
                <button onClick={async()=>{try{await navigator.clipboard.writeText(BANK.acct.replace(/-/g,""));setAcctCopied(true);setTimeout(()=>setAcctCopied(false),2000)}catch(e){}}} style={{width:"100%",background:"#f1f5f9",color:"#334155",border:"1.5px solid #e2e8f0",padding:12,borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:10}}>{acctCopied?"✓ คัดลอกแล้ว":"📋 คัดลอกเลขบัญชี"}</button>
                <div style={{background:"#FFFBEB",borderRadius:10,padding:"10px 12px",border:"1px solid #FEF3C7",marginBottom:4}}>
                  <p style={{fontSize:11,color:"#92400E",lineHeight:1.6}}>💡 <strong>ขั้นตอนสุดท้าย:</strong> โอนเงินตามยอด แล้วแนบสลิปด้านล่างเพื่อยืนยันการชำระ ออเดอร์ <strong>#{orderNo}</strong></p>
                </div>
              </div>
              {slipStatus!=="done"?(
                <div style={{marginTop:10,background:"#f8fafc",border:"1.5px dashed #cbd5e1",borderRadius:12,padding:"14px 12px",textAlign:"center"}}>
                  <p style={{fontSize:12,fontWeight:700,color:"#1e293b",marginBottom:8}}>📤 แนบสลิปโอนเงินตรงนี้</p>
                  {slipPreview&&<img src={slipPreview} style={{maxWidth:140,maxHeight:180,borderRadius:8,margin:"0 auto 8px",display:"block",border:"1px solid #e2e8f0"}} alt="slip"/>}
                  <label style={{display:"inline-block",background:"#fff",border:"1.5px solid #1565C0",color:"#1565C0",padding:"9px 18px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                    {slipFile?"เปลี่ยนรูป":"เลือกรูปสลิป"}
                    <input type="file" accept="image/*" onChange={pickSlip} style={{display:"none"}}/>
                  </label>
                  {slipPreview&&(
                    <button type="button" onClick={uploadSlip} disabled={slipStatus==="uploading"} style={{display:"block",width:"100%",marginTop:10,background:slipStatus==="uploading"?"#94a3b8":"#16a34a",color:"#fff",border:"none",padding:12,borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                      {slipStatus==="uploading"?"กำลังส่งสลิป...":"✓ ยืนยันการโอน · ส่งสลิป"}
                    </button>
                  )}
                </div>
              ):(
                <div style={{marginTop:10,background:"#dcfce7",border:"1.5px solid #86efac",borderRadius:12,padding:"16px 12px",textAlign:"center"}}>
                  <p style={{fontSize:14,fontWeight:700,color:"#166534"}}>✓ ส่งสลิปเรียบร้อย!</p>
                  <p style={{fontSize:11,color:"#15803d",marginTop:4}}>ร้านได้รับแจ้งเตือนแล้ว จะตรวจสอบและจัดเตรียมออเดอร์ #{orderNo} ให้เร็วที่สุดครับ</p>
                </div>
              )}
              <button onClick={openMessenger} style={{width:"100%",background:"#0084FF",color:"#fff",border:"none",padding:14,borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:10}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.91 1.19 5.44 3.14 7.17.16.14.26.35.27.57l.05 1.78c.02.57.6.94 1.12.71l1.98-.87c.17-.08.36-.09.53-.04.91.25 1.88.38 2.91.38 5.64 0 10-4.13 10-9.7S17.64 2 12 2z"/></svg>
                ติดต่อร้านทาง Messenger
              </button>
              <button onClick={finishOrder} style={{width:"100%",background:"none",color:"#94a3b8",border:"none",padding:8,fontSize:12,cursor:"pointer",marginTop:2}}>เสร็จสิ้น</button>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
