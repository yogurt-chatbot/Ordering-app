<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:#E8EDF2;display:flex;justify-content:center;align-items:center;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  #root{width:100%;max-width:480px;height:100vh;height:100dvh;background:#FAFBFD;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(27,58,75,0.12)}
  @media(min-width:481px){#root{height:94vh;border-radius:24px;border:1px solid #dde3ea}}
  .product-card{transition:transform .22s ease,box-shadow .22s ease;cursor:pointer}
  .product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(27,58,75,0.12)}
  .product-card:active{transform:scale(.97)}
  .size-btn{transition:all .18s ease;cursor:pointer}.size-btn:active{transform:scale(.95)}
  .cart-drawer{transition:transform .35s cubic-bezier(.32,.72,0,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}.cart-item-enter{animation:slideIn .3s ease forwards}
  @keyframes flyToCart{0%{transform:scale(1);opacity:1}50%{transform:scale(.6) translateY(-40px);opacity:.7}100%{transform:scale(.2) translateY(-80px) translateX(60px);opacity:0}}.fly-animation{animation:flyToCart .5s ease-in forwards}
  @keyframes notifSlide{0%{transform:translateX(-50%) translateY(-100%);opacity:0}15%{transform:translateX(-50%) translateY(0);opacity:1}85%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-100%);opacity:0}}.notification{animation:notifSlide 2s ease forwards}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}.cart-badge-pulse{animation:pulse .4s ease}
  .add-btn{transition:all .2s ease}.add-btn:active{transform:scale(.95);filter:brightness(.92)}
  .tab-btn{transition:all .2s ease;cursor:pointer}
  .cat-pill{transition:all .18s ease;cursor:pointer;white-space:nowrap}.cat-pill:active{transform:scale(.95)}
  .remove-btn{transition:all .15s ease}.remove-btn:active{background:#fee2e2}
  .checkout-btn{transition:all .2s ease}.checkout-btn:active{filter:brightness(.9);transform:scale(.98)}
  .scroll-area::-webkit-scrollbar{width:4px}.scroll-area::-webkit-scrollbar-track{background:transparent}.scroll-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>

                    a.click();
                    document.body.removeChild(a);
                  }} style={{marginTop:10,background:"#1565C0",color:"#fff",border:"none",padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6}}>
                    ⬇️ เซฟ QR ลงเครื่อง
                  </button>
                  <p style={{fontSize:9,color:"#b0bac6",marginTop:6}}>บน iPhone/iPad: กดค้างที่รูป QR แล้วเลือก "เพิ่มลงในรูปภาพ" ก็ได้</p>
                </div>
                <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginBottom:8}}>— หรือโอนผ่านเลขบัญชี —</p>
                <div style={{background:"linear-gradient(135deg,#0A8043,#16a34a)",borderRadius:14,padding:"18px 16px",color:"#fff",marginBottom:12}}>
                  <p style={{fontSize:11,opacity:.85,marginBottom:2}}>{BANK.name}</p>
                  <p style={{fontSize:22,fontWeight:700,letterSpacing:1,fontFamily:"'Fraunces',serif"}}>{BANK.acct}</p>
                  <p style={{fontSize:12,opacity:.9,marginTop:2}}>{BANK.holder}</p>
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.25)",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,opacity:.85}}>ยอดโอน{shipFee>0?" (รวมค่าส่ง ฿"+shipFee+")":""}</span>
                    <span style={{fontSize:24,fontWeight:700,fontFamily:"'Fraunces',serif"}}>฿{grandTotal()}</span>
                  </div>
                </div>
                <button onClick={async()=>{try{await navigator.clipboard.writeText(BANK.acct.replace(/-/g,""));setAcctCopied(true);setTimeout(()=>setAcctCopied(false),2000)}catch(e){}}} style={{width:"100%",background:"#f1f5f9",color:"#334155",border:"1.5px solid #e2e8f0",padding:12,borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:10}}>{acctCopied?"✓ คัดลอกแล้ว":"📋 คัดลอกเลขบัญชี"}</button>
                <div style={{background:"#FFFBEB",borderRadius:10,padding:"10px 12px",border:"1px solid #FEF3C7",marginBottom:4}}>
                  <p style={{fontSize:11,color:"#92400E",lineHeight:1.6}}>💡 <strong>ขั้นตอนสุดท้าย:</strong> โอนเงินตามยอด แล้วส่งสลิปพร้อมแจ้งเลขออเดอร์ <strong>#{orderNo}</strong> ทาง Messenger เพื่อยืนยันการชำระ</p>
                </div>
              </div>
              <button onClick={openMessenger} style={{width:"100%",background:"#0084FF",color:"#fff",border:"none",padding:14,borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:10}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.91 1.19 5.44 3.14 7.17.16.14.26.35.27.57l.05 1.78c.02.57.6.94 1.12.71l1.98-.87c.17-.08.36-.09.53-.04.91.25 1.88.38 2.91.38 5.64 0 10-4.13 10-9.7S17.64 2 12 2z"/></svg>
                ส่งสลิปทาง Messenger
              </button>
              <button onClick={finishOrder} style={{width:"100%",background:"none",color:"#94a3b8",border:"none",padding:8,fontSize:12,cursor:"pointer",marginTop:2}}>เสร็จสิ้น</button>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
